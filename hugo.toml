baseURL  = "https://wordpress-faq.com/"
title    = "WordPress FAQ"
theme    = "wpfaq"
languageCode = "en-us"

[taxonomies]
  tag      = "tags"
  category = "categories"

[params]
  description  = "Community-sourced WordPress answers from real users"
  twitterSite  = ""   # add @handle if you have one

[sitemap]
  changefreq = "daily"
  priority   = 0.7

[outputs]
  home    = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  page    = ["HTML"]
