{{ define "main" }}
<h1>{{ .Title }}</h1>
<p>{{ len .Pages }} articles</p>
<ul class="page-list">
  {{ range .Pages.ByLastmod.Reverse }}
  <li>
    <a href="{{ .Permalink }}">{{ .Title }}</a>
    {{ with .Params.seo }}
    <span class="verdict-short">— {{ .verdict }}</span>
    {{ end }}
  </li>
  {{ end }}
</ul>
{{ end }}
